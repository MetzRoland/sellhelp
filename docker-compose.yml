services:
  sellhelp:
      image: sellhelp:latest
      ports:
        - 8080:8080
      depends_on:
        - database
        - storage
        - bridge
      env_file: '.env-docker'

  frontend:
    image: frontend:latest
    ports:
      - 5173:5173
    depends_on:
     - sellhelp
    env_file: '.env-docker'

  database:
      image: postgres:latest
      ports:
        - 5432:5432
      env_file: '.env-docker'
      volumes:
        - ./data:/docker-entrypoint-initdb.d

  adminer:
    image: adminer
    restart: always
    ports:
      - 8888:8080
    depends_on:
      - database

  storage:
    image: 'minio/minio:latest'
    ports:
      - 9000:9000
      - 9001:9001
    env_file: '.env-docker'
    volumes:
      - ./minio_data:/data
    command: server /data --console-address ":9001"

  docs:
    image: shdocs:latest
    ports:
      - 7999:7999

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - 80:80
      - 443:443
    depends_on:
      - docs
      - sellhelp
      - storage
      - frontend

  bridge:
    image: dancwilliams/protonmail-bridge
    ports:
      - 1025:25/tcp
      - 1143:143/tcp
    restart: unless-stopped
    volumes:
      - ./protonmail:/root
