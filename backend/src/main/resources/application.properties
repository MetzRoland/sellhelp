spring.application.name=backend

# SMTP (sending email) - Use ProtonMail Bridge
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_SMTP_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.protocol=smtp
spring.mail.smtp.auth=true
spring.mail.smtp.starttls.enable=true
spring.mail.smtp.ssl.trust=${SPRING_MAIL_SMTP_SSL_TRUST}
spring.mail.from=${SPRING_MAIL_FROM}

spring.mail.properties.mail.debug=true

#IMAP (receiving email) - Use ProtonMail Bridge
spring.mail.properties.mail.imap.host=${SPRING_MAIL_HOST}
spring.mail.properties.mail.imap.port=${SPRING_MAIL_IMAP_PORT}
spring.mail.properties.mail.imap.user=${SPRING_MAIL_USERNAME}
spring.mail.properties.mail.imap.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.imap.ssl.enable=true
spring.mail.properties.mail.imap.auth=true

#Database configuration
spring.datasource.url=${DATABASE_HOST}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#Logs
logging.file.path=./logs
logging.file.name=./logs/application.log

#AWS S3 configuration
s3.accessKeyId=${S3_ACCESS_KEY_ID}
s3.secretKey=${S3_SECRET_ACCESS_KEY}
s3.region=${S3_REGION}
s3.bucket=${S3_BUCKET_NAME}
s3.endpoint=${S3_ENDPOINT}
s3.signedUrlDomain=${S3_SIGNED_URL_DOMAIN}
s3.aws=${S3_AWS}

logging.level.software.amazon.awssdk=DEBUG
logging.level.software.amazon.awssdk.http=DEBUG
logging.level.software.amazon.awssdk.services.s3=DEBUG

#JWT configuration
jwt.access.secret=${JWT_ACCESS_SECRET}
jwt.refresh.secret=${JWT_REFRESH_SECRET}
jwt.password.update.secret=${JWT_PASSWORD_UPDATE_SECRET}
jwt.access.time=${JWT_ACCESS_TIME}
jwt.refresh.time=${JWT_REFRESH_TIME}
jwt.password.update.time=${JWT_PASSWORD_UPDATE_TIME}

jwt.cookie.access.time=${JWT_COOKIE_ACCESS_TIME}
jwt.cookie.refresh.time=${JWT_COOKIE_REFRESH_TIME}

#Google oauth2 configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URL}

#File handling configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

#OpenApi configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.url=/api-docs

spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

frontend.url=${FRONTEND_URL}
