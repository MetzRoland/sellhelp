spring.application.name=backend

# SMTP (sending email) - Use ProtonMail Bridge
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_SMTP_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.protocol=smtp
spring.mail.smtp.auth=true
spring.mail.smtp.starttls.enable=true
spring.mail.smtp.ssl.trust=${SPRING_MAIL_SMTP_SSL_TRUST}
spring.mail.from=${SPRING_MAIL_FROM}

spring.mail.properties.mail.debug=true

# IMAP (receiving email) - Use ProtonMail Bridge
#spring.mail.properties.mail.imap.host=${SPRING_MAIL_HOST}
#spring.mail.properties.mail.imap.port=${SPRING_MAIL_IMAP_PORT}
#spring.mail.properties.mail.imap.user=${SPRING_MAIL_USERNAME}
#spring.mail.properties.mail.imap.password=${SPRING_MAIL_PASSWORD}
#spring.mail.properties.mail.imap.ssl.enable=true
#spring.mail.properties.mail.imap.auth=true

#Database configuration
spring.datasource.url=${DATABASE_HOST}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#AWS S3 configuration
aws.accessKeyId=${AWS_ACCESS_KEY_ID}
aws.secretKey=${AWS_SECRET_ACCESS_KEY}
aws.region=${AWS_REGION}
aws.s3.bucket=${AWS_BUCKET_NAME}

#JWT configuration
jwt.secret=${JWT_SECRET}

logging.level.software.amazon.awssdk=DEBUG
logging.level.software.amazon.awssdk.http=DEBUG
logging.level.software.amazon.awssdk.services.s3=DEBUG

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

