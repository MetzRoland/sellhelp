name: Spring Boot CI

# Trigger workflow on push or pull request events
on:
  push:
    branches:
      - backend/entities  # Trigger on push to the main branch
  pull_request:
    branches:
      - backend/entities  # Trigger on pull requests to the main branch

jobs:
  build:
    runs-on: ubuntu-latest  # Using the latest Ubuntu runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v2  # Checkout the repository

      - name: Set up JDK 25
        uses: actions/setup-java@v3
        with:
          java-version: '25'  # Use Java 11, change it if needed

      - name: Build with Maven
        run: mvn clean install -DskipTests=false  # Skip no tests (run all tests)

      - name: Run tests
        run: mvn test  # Run the tests after the build
