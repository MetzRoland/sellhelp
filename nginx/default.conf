server {
    listen 80;
    server_name storage.sellhelp.org;

    client_max_body_size 20m;

    location / {
        proxy_pass http://storage:9000/;

        #proxy_http_version 1.1;
        proxy_set_header Connection "";


        # Preserve original request info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for presigned URLs
        proxy_buffering off;
        proxy_request_buffering off;

        # Timeouts (important for large files)
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }
}

server {
    listen 80;
    server_name docs.sellhelp.org;

    location / {
        proxy_pass http://docs:7999;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

server {
    listen 80;
    server_name api.sellhelp.org;

    location / {
        proxy_pass http://sellhelp:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

server {
    listen 80;
    server_name sellhelp.org www.sellhelp.org;

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
