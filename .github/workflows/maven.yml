name: Java CI with Maven

on:
  push:
  pull_request:

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Compile code
        if: always()
        run: mvn -B clean compile
        continue-on-error: true
        working-directory: backend

      - name: Upload compiled classes
        uses: actions/upload-artifact@v4
        with:
          name: compiled-classes
          path: backend/target/classes

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Download compiled classes
        uses: actions/download-artifact@v4
        with:
          name: compiled-classes
          path: backend/target/classes

      - name: Run unit tests
        if: always()
        run: mvn -B test
        continue-on-error: true
        working-directory: backend

  package:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
  
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
  
      - name: Build artifact (JAR)
        id: package_step
        if: always()
        run: mvn -B package
        continue-on-error: true
        working-directory: backend
  
      # Check if JAR exists
      - name: Check if JAR exists
        id: jar_check
        run: |
          if ls backend/target/*.jar 1> /dev/null 2>&1; then
            echo "jar_exists=true" >> $GITHUB_OUTPUT
          else
            echo "jar_exists=false" >> $GITHUB_OUTPUT
          fi
  
      - name: Upload JAR artifact
        if: steps.jar_check.outputs.jar_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  verify:
    runs-on: ubuntu-latest
    needs: package

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Download JAR artifact
        if: ${{ needs.package.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target

      - name: Verify / Integration tests
        if: always()
        run: mvn -B verify
        continue-on-error: true
        working-directory: backend
